<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="coachpa.ge default OG card">
  <rect width="1200" height="630" fill="#0B1F3A"/>
  <!-- Top border accent -->
  <rect x="0" y="0" width="1200" height="6" fill="#E5A11C"/>

  <!-- Wordmark -->
  <text x="600" y="295" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="148" font-weight="700" letter-spacing="-6" text-anchor="middle">
    <tspan fill="#F5F2EC">coachpa</tspan><tspan fill="#E5A11C">.ge</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="358" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="500" letter-spacing="-0.5" fill="#F5F2EC" fill-opacity="0.85" text-anchor="middle">The online CV for football coaches.</text>

  <!-- Bloomberg-grammar stat strip -->
  <g transform="translate(200 480)">
    <line x1="0" y1="0" x2="800" y2="0" stroke="#E5A11C" stroke-opacity="0.3" stroke-width="1"/>
    <g font-family="'JetBrains Mono', 'Menlo', monospace" font-size="14" letter-spacing="2" fill="#F5F2EC">
      <text x="0" y="32" fill-opacity="0.55">COACHES</text>
      <text x="0" y="62" font-weight="700" font-size="24">5,200</text>

      <text x="220" y="32" fill-opacity="0.55">COUNTRIES</text>
      <text x="220" y="62" font-weight="700" font-size="24">47</text>

      <text x="440" y="32" fill-opacity="0.55">LICENCES LOGGED</text>
      <text x="440" y="62" font-weight="700" font-size="24">1,800</text>

      <text x="660" y="32" fill-opacity="0.55">PAGE VIEWS / WEEK</text>
      <text x="660" y="62" font-weight="700" font-size="24">12,400</text>
    </g>
  </g>

  <!-- Bottom strip -->
  <rect x="0" y="624" width="1200" height="6" fill="#E5A11C"/>
</svg>
